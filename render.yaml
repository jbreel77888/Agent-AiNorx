# Render Blueprint for Kortix (Suna) — Self-Hosted Deployment
# ============================================================
# Deploy via Render Dashboard: https://dashboard.render.com/select-repo
# Or use the Render API with this blueprint.
#
# PREREQUISITES:
#   1. Create a free Supabase project at https://supabase.com
#   2. Get your Supabase URL, anon key, and service role key
#   3. Fill in the env vars below (marked with YOUR_ prefix)
#   4. Add payment info to Render at https://dashboard.render.com/billing

databases:
  - name: kortix-db
    plan: starter
    region: oregon
    databaseName: kortix
    user: kortix_user
    # This creates a managed PostgreSQL on Render
    # The internal connection string will be available as DATABASE_URL

services:
  # ── API Service (Hono / Bun) ─────────────────────────────────────────
  - type: web
    name: kortix-api
    plan: starter
    region: oregon
    runtime: docker
    repo: https://github.com/jbreel77888/Agent-AiNorx
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    buildArgs:
      SERVICE: apps/api
    envVars:
      - key: PORT
        value: "8008"
      - key: NODE_ENV
        value: production
      - key: INTERNAL_KORTIX_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kortix-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false
        # Set this to your Supabase project URL
        # e.g. https://xxxxx.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        # Set this to your Supabase service role key
      - key: SUPABASE_ANON_KEY
        sync: false
        # Set this to your Supabase anon key
      - key: API_KEY_SECRET
        generateValue: true
      - key: ALLOWED_SANDBOX_PROVIDERS
        value: "none"
      - key: KORTIX_BILLING_INTERNAL_ENABLED
        value: "false"
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: LLM_GATEWAY_ENABLED
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
        # Optional: Add your OpenAI API key
      - key: ANTHROPIC_API_KEY
        sync: false
        # Optional: Add your Anthropic API key
      - key: OPENROUTER_API_KEY
        sync: false
        # Optional: Add your OpenRouter API key
    healthCheckPath: /v1/health

  # ── Web Frontend (Next.js) ───────────────────────────────────────────
  - type: web
    name: kortix-web
    plan: starter
    region: oregon
    runtime: docker
    repo: https://github.com/jbreel77888/Agent-AiNorx
    branch: main
    dockerfilePath: apps/web/Dockerfile.render
    dockerContext: .
    envVars:
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
        # Set this to your Supabase project URL (same as API)
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
        # Set this to your Supabase anon key (same as API)
      - key: NEXT_PUBLIC_BACKEND_URL
        # Will be set to the API service URL after API is deployed
        # e.g. https://kortix-api.onrender.com/v1
        sync: false
      - key: NEXT_PUBLIC_BILLING_ENABLED
        value: "false"
      - key: BACKEND_URL
        # Internal API URL for server-side calls
        sync: false
      - key: APP_URL
        # Will be set to the web service URL after deployment
        sync: false
